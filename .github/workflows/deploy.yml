name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Executing remote SSH commands using Password
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: 22
        script: |
          cd /root/BorsaBot
          git reset --hard
          git pull origin main
          npm install
          rm -rf server/node_modules
          cd server && npm install && cd ..
          pm2 delete all || true
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} pm2 start server/index.js --name borsabot
          sleep 8
          pm2 logs borsabot --lines 40 --nostream
